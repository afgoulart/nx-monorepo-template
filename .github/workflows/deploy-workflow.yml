name: Deploy workflow (reusable)

# Reusable workflow: builds + packages a single workflow's Lambda and applies
# its isolated Terraform stack. Called by the per-workflow deploy pipelines.
on:
  workflow_call:
    inputs:
      workflow_name:
        description: Name of the workflow (e.g. workflow-a). Must match apps/<name> and infra/<name>.
        required: true
        type: string
      environment:
        required: false
        type: string
        default: dev
      aws_region:
        required: false
        type: string
        default: us-east-1
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write # for aws-actions OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx nx build ${{ inputs.workflow_name }} --configuration=production

      - name: Package Lambda artifact
        run: |
          set -euo pipefail
          dotnet tool install -g Amazon.Lambda.Tools
          export PATH="$PATH:$HOME/.dotnet/tools"
          APP_DIR="apps/${{ inputs.workflow_name }}"
          OUT="dist/apps/${{ inputs.workflow_name }}"
          mkdir -p "$OUT"
          dotnet lambda package \
            --project-location "$APP_DIR" \
            --configuration Release \
            --framework net8.0 \
            --output-package "$OUT/lambda.zip"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init / plan / apply
        working-directory: infra/${{ inputs.workflow_name }}/terraform
        run: |
          terraform init
          terraform plan -out=tfplan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ inputs.aws_region }}"
          terraform apply -auto-approve tfplan
